<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Compliance Rationalizer</title>
    <meta
      name="description"
      content="Analyze related compliance policies and standards for redundancy, consolidation opportunities, and review flags."
    >
    <link rel="stylesheet" href="./styles.css?v=20260427k">
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <div class="page-shell">
      <header class="hero">
        <div class="hero-top">
          <div class="hero-title-wrap">
            <p class="eyebrow">Compliance Governance Analytics</p>
            <h1>Policy Rationalization</h1>
            <p class="subhead">
              Compare related documents, confirm the right requirement level, and move step by step toward clean consolidation recommendations.
            </p>
          </div>
          <div class="hero-source hero-source--inline">
            <span class="source-label" id="deployLabel">Last updated:</span>
            <span class="source-timestamp" id="deployTimestamp">Apr 27, 2026, 6:43 PM EDT</span>
          </div>
        </div>
      </header>

      <main class="wizard-layout">
        <section class="panel wizard-shell">
          <div class="panel__section wizard-progress-shell">
            <div data-step-progress></div>
          </div>

          <div class="panel__section wizard-status-shell" data-status-shell hidden>
            <div class="status" data-status></div>
          </div>

          <div class="panel__section wizard-content-shell">
            <div data-step-content></div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./app.mjs?v=20260427m"></script>
  </body>
</html>
